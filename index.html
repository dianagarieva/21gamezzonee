<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>21GameZone</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;500;600&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --surface2: #1a1a26;
  --border: #2a2a40;
  --accent: #7c3aed;
  --neon: #c084fc;
  --green: #22c55e;
  --red: #ef4444;
  --text: #e2e8f0;
  --muted: #6b7280;
  --yellow: #f59e0b;
}

body {
  background-color: var(--bg);
  color: var(--text);
  font-family: -apple-system, 'Inter', Arial, sans-serif;
  min-height: 100vh;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  background-color: rgba(10,10,15,0.97);
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: 18px;
  color: var(--neon);
  white-space: nowrap;
}
.logo span { color: #a855f7; }

.hdr-right {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

.user-badge {
  background-color: var(--surface2);
  border: 1px solid var(--border);
  padding: 5px 12px;
  border-radius: 20px;
  color: var(--neon);
  font-weight: 500;
  font-size: 13px;
  max-width: 110px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.admin-badge {
  background-color: rgba(245,158,11,0.1);
  border: 1px solid var(--yellow);
  padding: 5px 10px;
  border-radius: 20px;
  color: var(--yellow);
  font-weight: 600;
  font-size: 11px;
}
.btn-sm {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 5px 11px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-family: inherit;
  white-space: nowrap;
}
.btn-sm:active { opacity: 0.7; }

main { max-width: 1100px; margin: 0 auto; padding: 20px 14px 60px; }

.auth-wrap {
  min-height: 80vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10px;
}
.auth-card {
  background-color: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px 22px;
  width: 100%;
  max-width: 400px;
}
.auth-card h2 {
  font-family: 'Orbitron', sans-serif;
  font-size: 15px;
  color: var(--neon);
  margin-bottom: 6px;
}
.auth-card p { color: var(--muted); font-size: 13px; margin-bottom: 22px; }

.tabs {
  display: flex;
  margin-bottom: 20px;
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.tab-btn {
  flex: 1;
  padding: 10px;
  text-align: center;
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 14px;
  font-family: inherit;
}
.tab-btn.on { background-color: var(--accent); color: #fff; font-weight: 600; }

.field { margin-bottom: 14px; }
.field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; font-weight: 500; }
.field input, .field select {
  width: 100%;
  background-color: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  color: var(--text);
  font-size: 16px;
  font-family: inherit;
  outline: none;
}
.field input:focus, .field select:focus { border-color: #a855f7; }

.btn-main {
  width: 100%;
  padding: 14px;
  background-color: var(--accent);
  border: none;
  border-radius: 8px;
  color: #fff;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
}
.btn-main:active { opacity: 0.85; }

.err { color: var(--red); font-size: 12px; margin-top: 10px; text-align: center; min-height: 18px; }

.sync-bar {
  position: fixed;
  top: 60px;
  right: 10px;
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 11px;
  z-index: 1000;
  display: none;
  background: rgba(0,0,0,0.8);
  border: 1px solid var(--border);
}
.sync-bar.show { display: block; }
.sync-bar.ok { color: var(--green); border-color: var(--green); }
.sync-bar.err { color: var(--red); border-color: var(--red); }
.sync-bar.loading { color: var(--yellow); border-color: var(--yellow); }

.btn-sync {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: var(--accent);
  color: white;
  border: none;
  padding: 10px 16px;
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
  z-index: 1000;
  font-family: inherit;
  box-shadow: 0 4px 12px rgba(124,58,237,0.4);
}
.btn-sync:active { opacity: 0.8; }

.sec-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 11px;
  letter-spacing: 1.5px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 10px;
}

.plat-row, .games-grid, .time-grid, .stats-row, .filter-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 24px;
}
.plat-btn, .date-btn, .time-slot {
  background-color: var(--surface);
  border: 2px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  text-align: center;
  cursor: pointer;
  color: var(--text);
  flex: 1;
  min-width: 80px;
}
.plat-btn.on, .date-btn.on { border-color: var(--neon); background-color: rgba(192,132,252,0.07); }
.plat-icon { font-size: 22px; display: block; margin-bottom: 4px; }
.plat-name { font-size: 11px; font-weight: 600; color: var(--muted); }
.plat-btn.on .plat-name { color: var(--neon); }

.game-card {
  width: calc(33.33% - 6px);
  background-color: var(--surface);
  border: 2px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  position: relative;
}
.game-card.on { border-color: var(--neon); }
.game-card.busy { opacity: 0.4; cursor: not-allowed; border-color: var(--muted); }

.game-img-wrap {
  width: 100%;
  padding-bottom: 100%;
  position: relative;
  background-color: var(--surface2);
  overflow: hidden;
}
.game-img-wrap img {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.fallback-ico {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  background-color: var(--surface2);
}
.game-name {
  padding: 6px 5px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text);
  text-align: center;
  line-height: 1.3;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.busy-badge {
  position: absolute;
  top: 4px; right: 4px;
  background-color: rgba(0,0,0,0.75);
  color: #9ca3af;
  font-size: 8px;
  padding: 2px 4px;
  border-radius: 3px;
  font-weight: 700;
}

.date-row {
  display: flex;
  gap: 6px;
  margin-bottom: 24px;
  overflow-x: auto;
  padding-bottom: 4px;
}
.date-btn { flex-shrink: 0; min-width: 60px; }
.date-day { font-size: 10px; color: var(--muted); }
.date-num { font-size: 18px; font-weight: 700; font-family: 'Orbitron', sans-serif; }
.date-btn.on .date-num { color: var(--neon); }
.date-mon { font-size: 10px; color: var(--muted); }

.legend { display: flex; gap: 14px; margin-bottom: 10px; flex-wrap: wrap; }
.leg-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); }
.leg-dot { width: 12px; height: 12px; border-radius: 3px; border: 2px solid; flex-shrink: 0; }
.leg-dot.free { border-color: var(--border); background-color: var(--surface); }
.leg-dot.bkd  { background-color: var(--gray); border-color: var(--gray); }
.leg-dot.sel  { border-color: var(--green); background-color: rgba(34,197,94,0.08); }

.time-slot { width: calc(25% - 6px); min-width: 50px; font-size: 13px; font-weight: 600; }
.time-slot.on { border-color: var(--green); background-color: rgba(34,197,94,0.07); color: var(--green); }
.time-slot.bkd { background-color: var(--gray); border-color: var(--gray); color: #555; cursor: not-allowed; }

.summary {
  background-color: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 20px;
}
.sum-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
.sum-item { min-width: 100px; }
.sum-label { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
.sum-val { color: var(--neon); font-weight: 600; font-size: 13px; }
.btn-book {
  width: 100%;
  padding: 14px;
  background-color: #16a34a;
  border: none;
  border-radius: 8px;
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
}
.btn-book:disabled { background-color: var(--gray); cursor: not-allowed; color: var(--muted); }
.btn-book:not(:disabled):active { opacity: 0.85; }

.success-wrap { text-align: center; padding: 40px 16px; }
.success-wrap h2 { font-family: 'Orbitron', sans-serif; color: var(--green); font-size: 18px; margin-bottom: 10px; }
.success-wrap p  { color: var(--muted); font-size: 14px; margin-bottom: 20px; }
.confirm-box {
  background-color: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px;
  display: inline-block;
  text-align: left;
  margin-bottom: 24px;
  min-width: 260px;
  max-width: 100%;
}
.c-row { display: flex; justify-content: space-between; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.c-row:last-child { border-bottom: none; }
.c-key { color: var(--muted); }
.c-val { color: var(--text); font-weight: 600; text-align: right; }

.admin-wrap h1 { font-family: 'Orbitron', sans-serif; font-size: 16px; color: var(--yellow); margin-bottom: 6px; }
.admin-wrap .sub { color: var(--muted); font-size: 13px; margin-bottom: 18px; }
.stat-card { background-color: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; flex: 1; min-width: 90px; }
.stat-num { font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 700; color: var(--neon); }
.stat-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }

.filter-row select, .filter-row input {
  background-color: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  outline: none;
}
.filter-row input { flex: 1; min-width: 160px; }

.table-wrap { background-color: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; overflow-x: auto; }
.adm-table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 480px; }
.adm-table th { text-align: left; padding: 10px 14px; background-color: var(--surface2); color: var(--muted); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; border-bottom: 1px solid var(--border); font-weight: 600; }
.adm-table td { padding: 10px 14px; border-bottom: 1px solid rgba(42,42,64,0.5); vertical-align: middle; }
.ptag { display: inline-block; padding: 3px 7px; border-radius: 5px; font-size: 11px; font-weight: 700; }
.tag-ps5  { background-color: rgba(0,80,255,0.12); color: #60a5fa; border: 1px solid rgba(0,80,255,0.25); }
.tag-xbox { background-color: rgba(34,197,94,0.08); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
.tag-vr   { background-color: rgba(245,158,11,0.08); color: var(--yellow); border: 1px solid rgba(245,158,11,0.2); }
.del-btn { background: none; border: 1px solid rgba(239,68,68,0.3); color: var(--red); padding: 4px 9px; border-radius: 5px; cursor: pointer; font-size: 12px; font-family: inherit; }
.empty { text-align: center; padding: 36px; color: var(--muted); font-size: 14px; }

.admin-games-section { margin-top: 30px; padding-top: 30px; border-top: 1px solid var(--border); }
.game-form { background-color: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
.game-form h3 { font-family: 'Orbitron', sans-serif; color: var(--neon); font-size: 14px; margin-bottom: 16px; }
.form-row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
.form-row .field { flex: 1; min-width: 200px; }
.img-preview { width: 100%; max-width: 300px; height: 200px; background-color: var(--surface2); border: 2px dashed var(--border); border-radius: 8px; margin: 12px 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.img-preview img { width: 100%; height: 100%; object-fit: cover; }
.img-preview .placeholder { color: var(--muted); font-size: 13px; text-align: center; padding: 20px; }
.file-input-wrapper input[type=file] { display: none; }
.file-input-label { display: block; padding: 12px; background-color: var(--surface2); border: 1px solid var(--border); border-radius: 8px; text-align: center; cursor: pointer; color: var(--neon); font-size: 13px; }
.btn-add { background-color: var(--green); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; font-family: inherit; }
.btn-add:active { opacity: 0.85; }
.game-list-item { display: flex; align-items: center; gap: 12px; padding: 12px; background-color: var(--surface2); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; }
.game-list-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; }
.game-list-info { flex: 1; }
.game-list-title { font-weight: 600; color: var(--text); font-size: 13px; }
.game-list-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }

@media (max-width: 480px) {
  main { padding: 14px 10px 50px; }
  .game-card { width: calc(50% - 4px); }
  .time-slot { width: calc(33.33% - 5px); min-width: 50px; font-size: 12px; }
  .auth-card { padding: 22px 16px; }
  .logo { font-size: 15px; }
  .form-row { flex-direction: column; }
  .form-row .field { min-width: 100%; }
}
@media (max-width: 360px) {
  .game-card { width: 100%; }
}
</style>
</head>
<body>

<header>
  <div class="logo">21Game<span>Zone</span></div>
  <div class="hdr-right" id="hdr"></div>
</header>

<main id="root"></main>

<div id="syncBar" class="sync-bar"></div>
<button id="syncBtn" class="btn-sync" style="display:none" onclick="manualSync()">🔄 Обновить данные</button>

<script>
// ============ КОНФИГУРАЦИЯ JSONBIN ============
const BIN_ID = '6a3b77d1da38895dfef5b2c2';
const API_KEY = '$2a$10$pEvy0ct1XR/MqXrtEi0G2.JeN4MZB40N5qlDEXMB5YCKb1wZ4SR/O';
const BIN_URL = 'https://api.jsonbin.io/v3/b/' + BIN_ID;

// ============ ДАННЫЕ ============
var PLATFORMS = [
  {id:'PS5',  icon:'🎮', label:'PlayStation 5'},
  {id:'XBOX', icon:'🟢', label:'Xbox Series X'},
  {id:'VR',   icon:'🥽', label:'Meta Quest VR'}
];

var EMO = {'RPG':'','Шутер':'🔫','Экшн':'⚔️','Файтинг':'🥊','Гонки':'🏎️',
  'Футбол':'','Баскетбол':'🏀','Ритм':'🎵','Пазлы':'🧩','Хоррор':'👻',
  'Гольф':'⛳','Теннис':'🏓','MMORPG':'🌐','Sci-Fi':'🚀','Инди':'🎵','def':'🎮'};

var TIMES = ['09:00','10:00','11:00','12:00','13:00','14:00','15:00',
             '16:00','17:00','18:00','19:00','20:00','21:00','22:00'];
var DAYS  = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
var MONS  = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];

// ============ СОСТОЯНИЕ ============
var S = {
  screen: 'auth', tab: 'login',
  user: null, role: null, userLogin: null,
  plat: 'PS5', game: null, date: null, time: null,
  last: null,
  af: {plat:'', date:'', q:''},
  newGame: {t:'', g:'', p:'PS5', img:''}
};

var users = {};
var bookings = [];
var GAMES = [];
var saveTimeout = null;
var syncInProgress = false;

// ============ LOCAL STORAGE (мгновенно) ============
function lsGet(key, def) {
  try {
    var v = localStorage.getItem(key);
    return v ? JSON.parse(v) : def;
  } catch(e) { return def; }
}

function lsSet(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
    return true;
  } catch(e) { return false; }
}

// ============ СИНХРОНИЗАЦИЯ ============
function showSync(msg, type) {
  var el = document.getElementById('syncBar');
  el.textContent = msg;
  el.className = 'sync-bar show ' + type;
  setTimeout(function() { el.className = 'sync-bar'; }, 2500);
}

async function fetchFromServer() {
  try {
    var resp = await fetch(BIN_URL, {
      method: 'GET',
      headers: { 'X-Master-Key': API_KEY }
    });
    if (!resp.ok) return null;
    var data = await resp.json();
    return data.record;
  } catch(e) {
    console.error('Fetch error:', e);
    return null;
  }
}

async function saveToServer(data) {
  if (syncInProgress) return false;
  syncInProgress = true;
  showSync(' Синхронизация...', 'loading');
  
  try {
    var resp = await fetch(BIN_URL, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': API_KEY
      },
      body: JSON.stringify(data)
    });
    if (resp.ok) {
      showSync('✓ Сохранено', 'ok');
      return true;
    } else {
      showSync('✗ Ошибка сервера', 'err');
      return false;
    }
  } catch(e) {
    console.error('Save error:', e);
    showSync('✗ Нет связи', 'err');
    return false;
  } finally {
    syncInProgress = false;
  }
}

// Сохранение: сначала локально (мгновенно), потом на сервер
function scheduleSave() {
  lsSet('gz_data', {
    users: users,
    bookings: bookings,
    games: GAMES,
    timestamp: Date.now()
  });
  
  if (saveTimeout) clearTimeout(saveTimeout);
  saveTimeout = setTimeout(function() {
    saveToServer({ users: users, bookings: bookings, games: GAMES });
  }, 1500);
}

// Ручная синхронизация
async function manualSync() {
  showSync('⏳ Загрузка с сервера...', 'loading');
  var data = await fetchFromServer();
  if (data) {
    users = data.users || users;
    bookings = data.bookings || bookings;
    GAMES = data.games || GAMES;
    lsSet('gz_data', { users: users, bookings: bookings, games: GAMES, timestamp: Date.now() });
    showSync('✓ Данные обновлены', 'ok');
    render();
  } else {
    showSync('✗ Не удалось загрузить', 'err');
  }
}

// ============ ЗАГРУЗКА ДАННЫХ (БЫСТРАЯ) ============
function loadData() {
  // 1. МГНОВЕННО загружаем из localStorage
  var localData = lsGet('gz_data', null);
  
  if (localData && localData.users) {
    users = localData.users;
    bookings = localData.bookings || [];
    GAMES = localData.games || [];
  } else {
    // Дефолтные данные
    users = { 'admin': { name: 'Администратор', pass: 'admin123', role: 'admin' } };
    bookings = [];
    GAMES = getDefaultGames();
    lsSet('gz_data', { users: users, bookings: bookings, games: GAMES, timestamp: Date.now() });
  }
  
  // 2. Восстанавливаем сессию (по логину, не по имени!)
  var session = lsGet('gz_session', null);
  if (session && session.login && users[session.login]) {
    S.userLogin = session.login;
    S.user = users[session.login].name;
    S.role = users[session.login].role;
    S.screen = S.role === 'admin' ? 'admin' : 'booking';
  }
  
  // 3. Рендерим СРАЗУ (мгновенно)
  render();
  showSyncBtn();
  
  // 4. В ФОНЕ синхронизируем с сервером
  syncFromServer();
}

async function syncFromServer() {
  var data = await fetchFromServer();
  if (data && data.users) {
    var serverTime = data.timestamp || 0;
    var localTime = lsGet('gz_data', {}).timestamp || 0;
    
    // Если сервер новее — обновляем
    if (serverTime > localTime) {
      users = data.users;
      bookings = data.bookings || [];
      GAMES = data.games || [];
      lsSet('gz_data', { users: users, bookings: bookings, games: GAMES, timestamp: serverTime });
      
      // Проверяем сессию
      if (S.userLogin && !users[S.userLogin]) {
        S.user = null; S.role = null; S.userLogin = null;
        S.screen = 'auth';
        lsSet('gz_session', null);
      }
      
      showSync('✓ Обновлено с сервера', 'ok');
      render();
    } else {
      showSync('✓ Актуально', 'ok');
    }
  }
}

// ============ ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ============
function getDates() {
  var res = [], today = new Date();
  for (var i = 0; i < 7; i++) {
    var d = new Date(today);
    d.setDate(today.getDate() + i);
    res.push({
      label: i === 0 ? 'Сегодня' : DAYS[d.getDay()],
      num: d.getDate(),
      mon: MONS[d.getMonth()],
      full: d.toISOString().split('T')[0]
    });
  }
  return res;
}

function isBusy(gid, date, time, plat) {
  for (var i = 0; i < bookings.length; i++) {
    var b = bookings[i];
    if (b.game===gid && b.date===date && b.time===time && b.plat===plat) return true;
  }
  return false;
}

function getP(id) { for(var i=0;i<PLATFORMS.length;i++){if(PLATFORMS[i].id===id)return PLATFORMS[i];}return null;}
function getG(id) { for(var i=0;i<GAMES.length;i++){if(GAMES[i].id===id)return GAMES[i];}return null;}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function genId() {
  return 'g' + Date.now() + Math.random().toString(36).substr(2, 5);
}

// ============ ДЕЙСТВИЯ ============
function setTab(t)  { S.tab=t; render(); }
function setPlat(p) { S.plat=p; S.game=null; render(); }
function setGame(id){ S.game=id; render(); }
function setDate(d) { S.date=d; S.time=null; render(); }
function setTime(t) { S.time=t; render(); }
function goAdmin()  { S.screen='admin'; render(); }
function goBook()   { S.screen='booking'; render(); }
function afSet(k,v) { S.af[k]=v; render(); }
function afClear()  { S.af={plat:'',date:'',q:''}; render(); }

function handleImageUpload(event) {
  var file = event.target.files[0];
  if (!file) return;
  
  if (file.size > 200 * 1024) {
    alert('Изображение слишком большое! Максимум 200KB. Сейчас: ' + Math.round(file.size / 1024) + 'KB');
    return;
  }
  
  var reader = new FileReader();
  reader.onload = function(e) {
    S.newGame.img = e.target.result;
    render();
  };
  reader.readAsDataURL(file);
}

function addGame() {
  var title = document.getElementById('gameTitle').value.trim();
  var genre = document.getElementById('gameGenre').value.trim();
  var plat = document.getElementById('gamePlatform').value;
  
  if (!title || !genre) {
    alert('Заполните название и жанр игры');
    return;
  }
  
  var newGame = {
    id: genId(),
    t: title,
    g: genre,
    p: plat,
    img: S.newGame.img || ''
  };
  
  GAMES.push(newGame);
  scheduleSave();
  
  S.newGame = {t:'', g:'', p:'PS5', img:''};
  render();
  alert('Игра добавлена!');
}

function delGame(id) {
  var hasBookings = false;
  for (var i=0; i<bookings.length; i++) {
    if (bookings[i].game === id) { hasBookings = true; break; }
  }
  
  if (hasBookings) {
    if (!confirm('На эту игру есть бронирования! Удалить всё равно?')) return;
  } else {
    if (!confirm('Удалить эту игру?')) return;
  }
  
  for (var i=0; i<GAMES.length; i++) {
    if (GAMES[i].id === id) { GAMES.splice(i, 1); break; }
  }
  scheduleSave();
  render();
}

function doLogin() {
  var l = document.getElementById('al').value.trim();
  var p = document.getElementById('ap').value;
  var e = document.getElementById('ae');
  if (!l||!p) { e.textContent='Заполни все поля'; return; }
  if (!users[l]) { e.textContent='Пользователь не найден'; return; }
  if (users[l].pass !== p) { e.textContent='Неверный пароль'; return; }
  
  S.userLogin = l;
  S.user = users[l].name || l;
  S.role = users[l].role || 'user';
  S.screen = S.role==='admin' ? 'admin' : 'booking';
  
  lsSet('gz_session', { login: S.userLogin, name: S.user, role: S.role });
  render();
}

function doReg() {
  var n = document.getElementById('rn').value.trim();
  var l = document.getElementById('al').value.trim();
  var p = document.getElementById('ap').value;
  var p2 = document.getElementById('ap2').value;
  var e = document.getElementById('ae');
  if (!n||!l||!p) { e.textContent='Заполни все поля'; return; }
  if (p !== p2)   { e.textContent='Пароли не совпадают'; return; }
  if (p.length<4) { e.textContent='Пароль минимум 4 символа'; return; }
  if (users[l])   { e.textContent='Такой логин уже занят'; return; }
  
  users[l] = {name:n, pass:p, role:'user'};
  scheduleSave();
  
  S.userLogin = l;
  S.user = n;
  S.role = 'user';
  S.screen = 'booking';
  
  lsSet('gz_session', { login: S.userLogin, name: S.user, role: S.role });
  render();
}

function doLogout() {
  S.user=null; S.role=null; S.userLogin=null; S.screen='auth';
  S.game=null; S.date=null; S.time=null;
  lsSet('gz_session', null);
  render();
}

function doBook() {
  if (!S.game||!S.date||!S.time) return;
  var b = {id:Date.now(), user:S.user, game:S.game, date:S.date, time:S.time, plat:S.plat};
  bookings.push(b);
  scheduleSave();
  S.last=b; S.game=null; S.date=null; S.time=null; S.screen='success';
  render();
}

function delBook(id) {
  if (!confirm('Удалить эту бронь?')) return;
  for (var i=0; i<bookings.length; i++) {
    if (bookings[i].id===id) { bookings.splice(i,1); break; }
  }
  scheduleSave();
  render();
}

// ============ ЗАПУСК ============
loadData();
</script>
</body>
</html>
